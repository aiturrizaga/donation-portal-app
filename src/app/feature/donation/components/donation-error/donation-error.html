<div class="flex flex-col px-6 py-8 gap-4">

  <!-- Error message -->
  <div class="flex flex-col gap-1 bg-red-50 border border-red-200 rounded-xl px-4 py-3">
    <span class="text-sm font-semibold text-red-600">Tarjeta rechazada</span>
    <span class="text-xs text-red-500">
      {{ error() ?? 'Fondos insuficientes. Intenta con otra tarjeta o método de pago.' }}
    </span>
  </div>

  <!-- Actions -->
  <div class="flex flex-col gap-2">
    <button
      type="button"
      class="w-full py-3.5 rounded-xl bg-emerald-500 text-white text-sm font-bold flex items-center justify-center gap-2 cursor-pointer"
      (click)="retry()"
    >
      <i class="ti ti-lock text-base"></i>
      Intentar de nuevo
    </button>

    <button
      type="button"
      class="w-full py-2.5 rounded-xl border border-gray-200 text-gray-600 text-sm font-medium flex items-center justify-center gap-1.5 cursor-pointer"
      (click)="back()"
    >
      <i class="ti ti-arrow-left text-base"></i>
      Volver al resumen
    </button>
  </div>

  <div class="flex items-center justify-between">
    <span class="text-xs text-gray-400">3 / 3</span>
  </div>

</div>
