<div class="min-h-screen relative flex items-center justify-end pr-8"
     style="background: linear-gradient(135deg, #0f1923 0%, #1a2a3a 50%, #0d2318 100%)">

  <!-- Background illustration placeholder -->
  <div class="absolute inset-0 overflow-hidden pointer-events-none">
    <div class="absolute bottom-0 left-0 w-2/3 h-3/4 opacity-10">
      <!-- SVG hero goes here -->
    </div>
  </div>

  <!-- Left content -->
  <div class="absolute left-12 top-1/2 -translate-y-1/2 max-w-sm hidden lg:block">
    <h1 class="text-4xl font-bold text-white leading-tight">
      Cada donación<br>
      <span class="text-emerald-400">transforma</span> una vida
    </h1>
    <p class="text-gray-300 text-sm mt-3 leading-relaxed">
      Tu aporte llega directamente a comunidades vulnerables del Perú.
      Seguro, transparente y con certificado de donación.
    </p>
  </div>

  <!-- Donation form -->
  @if (slug()) {
    <app-donation-form [slug]="slug()" />
  }

</div>
